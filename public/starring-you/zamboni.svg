<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    @keyframes zamboniDrive {
      0% { transform: translateX(0); }
      50% { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }
    @keyframes wheelSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes iceShimmer {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.3; }
    }
    @keyframes lightGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.9; }
    }
    .zamboni-body { animation: zamboniDrive 3s ease-in-out infinite; }
    .wheel { animation: wheelSpin 1.5s linear infinite; transform-box: fill-box; transform-origin: center; }
    .ice-shimmer { animation: iceShimmer 4s ease-in-out infinite; }
    .arena-light { animation: lightGlow 2.5s ease-in-out infinite; }
    .caption-text { font-family: Arial, Helvetica, sans-serif; font-weight: 700; font-size: 14px; fill: #e63946; text-anchor: middle; text-transform: uppercase; letter-spacing: 2px; }
    .board-text { font-family: Arial, Helvetica, sans-serif; font-weight: 900; font-size: 18px; fill: #ffffff; text-anchor: middle; letter-spacing: 4px; }
  </style>

  <defs>
    <!-- Face hole mask -->
    <mask id="face-mask">
      <rect width="400" height="500" fill="white"/>
      <circle cx="235" cy="145" r="40" fill="black"/>
    </mask>

    <!-- Ice surface gradient -->
    <linearGradient id="ice-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4eef7"/>
      <stop offset="40%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#c5e4f0"/>
    </linearGradient>

    <!-- Arena background gradient -->
    <linearGradient id="arena-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Zamboni body gradient -->
    <linearGradient id="zamboni-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e4e8"/>
    </linearGradient>

    <!-- Zamboni blue accent gradient -->
    <linearGradient id="zamboni-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6db5"/>
      <stop offset="100%" stop-color="#1b4f8a"/>
    </linearGradient>

    <!-- Tank gradient -->
    <linearGradient id="tank-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8d6e5"/>
      <stop offset="50%" stop-color="#dfe6ed"/>
      <stop offset="100%" stop-color="#c8d6e5"/>
    </linearGradient>

    <!-- Seat gradient -->
    <linearGradient id="seat-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Board gradient -->
    <linearGradient id="board-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="30%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>

    <!-- Dasher board top -->
    <linearGradient id="dasher-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc2936"/>
      <stop offset="100%" stop-color="#a31d28"/>
    </linearGradient>

    <!-- Jacket gradient -->
    <linearGradient id="jacket-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5aa8"/>
      <stop offset="100%" stop-color="#153d75"/>
    </linearGradient>

    <!-- Rubber edge gradient -->
    <linearGradient id="rubber-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Water sheen -->
    <linearGradient id="water-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5dade2" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#85c1e9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5dade2" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Glass plexiglass gradient -->
    <linearGradient id="plexi-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4e6f1" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- ============ BACKGROUND: ARENA ============ -->
  <rect width="400" height="500" fill="url(#arena-grad)"/>

  <!-- Arena stands - rows of seats -->
  <g opacity="0.6">
    <rect x="0" y="0" width="400" height="30" fill="#12122a"/>
    <rect x="0" y="30" width="400" height="25" fill="#1c1c3a"/>
    <rect x="0" y="55" width="400" height="25" fill="#24244a"/>
    <rect x="0" y="80" width="400" height="20" fill="#2c2c55"/>
    <!-- Seat dots row 1 -->
    <g fill="#e74c3c" opacity="0.3">
      <circle cx="20" cy="15" r="3"/><circle cx="50" cy="15" r="3"/><circle cx="80" cy="15" r="3"/>
      <circle cx="110" cy="15" r="3"/><circle cx="140" cy="15" r="3"/><circle cx="170" cy="15" r="3"/>
      <circle cx="200" cy="15" r="3"/><circle cx="230" cy="15" r="3"/><circle cx="260" cy="15" r="3"/>
      <circle cx="290" cy="15" r="3"/><circle cx="320" cy="15" r="3"/><circle cx="350" cy="15" r="3"/>
      <circle cx="380" cy="15" r="3"/>
    </g>
    <!-- Seat dots row 2 -->
    <g fill="#3498db" opacity="0.3">
      <circle cx="35" cy="42" r="3"/><circle cx="65" cy="42" r="3"/><circle cx="95" cy="42" r="3"/>
      <circle cx="125" cy="42" r="3"/><circle cx="155" cy="42" r="3"/><circle cx="185" cy="42" r="3"/>
      <circle cx="215" cy="42" r="3"/><circle cx="245" cy="42" r="3"/><circle cx="275" cy="42" r="3"/>
      <circle cx="305" cy="42" r="3"/><circle cx="335" cy="42" r="3"/><circle cx="365" cy="42" r="3"/>
    </g>
    <!-- Seat dots row 3 -->
    <g fill="#e67e22" opacity="0.3">
      <circle cx="20" cy="68" r="3"/><circle cx="50" cy="68" r="3"/><circle cx="80" cy="68" r="3"/>
      <circle cx="110" cy="68" r="3"/><circle cx="140" cy="68" r="3"/><circle cx="170" cy="68" r="3"/>
      <circle cx="200" cy="68" r="3"/><circle cx="230" cy="68" r="3"/><circle cx="260" cy="68" r="3"/>
      <circle cx="290" cy="68" r="3"/><circle cx="320" cy="68" r="3"/><circle cx="350" cy="68" r="3"/>
      <circle cx="380" cy="68" r="3"/>
    </g>
    <!-- Seat dots row 4 -->
    <g fill="#2ecc71" opacity="0.25">
      <circle cx="35" cy="90" r="3"/><circle cx="65" cy="90" r="3"/><circle cx="95" cy="90" r="3"/>
      <circle cx="125" cy="90" r="3"/><circle cx="155" cy="90" r="3"/><circle cx="185" cy="90" r="3"/>
      <circle cx="215" cy="90" r="3"/><circle cx="245" cy="90" r="3"/><circle cx="275" cy="90" r="3"/>
      <circle cx="305" cy="90" r="3"/><circle cx="335" cy="90" r="3"/><circle cx="365" cy="90" r="3"/>
    </g>
  </g>

  <!-- Arena lights -->
  <g class="arena-light">
    <ellipse cx="100" cy="10" rx="25" ry="6" fill="#fff8e1" opacity="0.7"/>
    <ellipse cx="200" cy="8" rx="30" ry="7" fill="#fff8e1" opacity="0.8"/>
    <ellipse cx="300" cy="10" rx="25" ry="6" fill="#fff8e1" opacity="0.7"/>
  </g>
  <!-- Light beams -->
  <polygon points="85,16 115,16 140,100 60,100" fill="#fff8e1" opacity="0.03"/>
  <polygon points="180,14 220,14 250,100 150,100" fill="#fff8e1" opacity="0.04"/>
  <polygon points="285,16 315,16 340,100 260,100" fill="#fff8e1" opacity="0.03"/>

  <!-- ============ PLEXIGLASS / BOARDS ============ -->
  <rect x="0" y="100" width="400" height="60" fill="url(#plexi-grad)"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="#8e9eab" stroke-width="1" opacity="0.5"/>

  <!-- Rink boards -->
  <rect x="0" y="160" width="400" height="65" fill="url(#board-grad)" stroke="#999" stroke-width="0.5"/>
  <!-- Red dasher cap -->
  <rect x="0" y="160" width="400" height="8" fill="url(#dasher-top)"/>
  <!-- Board panel lines -->
  <line x1="60" y1="168" x2="60" y2="225" stroke="#c0c0c0" stroke-width="0.5" opacity="0.6"/>
  <line x1="130" y1="168" x2="130" y2="225" stroke="#c0c0c0" stroke-width="0.5" opacity="0.6"/>
  <line x1="200" y1="168" x2="200" y2="225" stroke="#c0c0c0" stroke-width="0.5" opacity="0.6"/>
  <line x1="270" y1="168" x2="270" y2="225" stroke="#c0c0c0" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="168" x2="340" y2="225" stroke="#c0c0c0" stroke-width="0.5" opacity="0.6"/>

  <!-- CANADA advertisement on boards -->
  <rect x="100" y="178" width="200" height="32" rx="3" fill="#cc2936"/>
  <text x="200" y="200" class="board-text">CANADA</text>
  <!-- Maple leaf decorations -->
  <g fill="#ffffff" opacity="0.9" transform="translate(108,186) scale(0.7)">
    <path d="M10,0 L12,-5 L14,-2 L16,-7 L18,-3 L21,-5 L20,-1 L23,-1 L19,3 L20,5 L17,4 L16,8 L15,4 L12,5 L13,3 L9,-1 L12,-1 Z"/>
  </g>
  <g fill="#ffffff" opacity="0.9" transform="translate(272,186) scale(0.7)">
    <path d="M10,0 L12,-5 L14,-2 L16,-7 L18,-3 L21,-5 L20,-1 L23,-1 L19,3 L20,5 L17,4 L16,8 L15,4 L12,5 L13,3 L9,-1 L12,-1 Z"/>
  </g>

  <!-- ============ ICE SURFACE ============ -->
  <rect x="0" y="225" width="400" height="275" fill="url(#ice-grad)"/>

  <!-- Ice texture scratch lines -->
  <g stroke="#b8dae8" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="260" x2="400" y2="262"/>
    <line x1="0" y1="290" x2="400" y2="288"/>
    <line x1="0" y1="320" x2="400" y2="322"/>
    <line x1="0" y1="350" x2="400" y2="348"/>
    <line x1="0" y1="380" x2="400" y2="382"/>
  </g>

  <!-- Fresh ice trail behind Zamboni -->
  <rect x="220" y="340" width="180" height="120" fill="url(#water-sheen)" opacity="0.4" rx="2"/>

  <!-- Ice shimmer highlights -->
  <g class="ice-shimmer">
    <ellipse cx="80" cy="300" rx="30" ry="3" fill="#ffffff" opacity="0.2"/>
    <ellipse cx="320" cy="380" rx="40" ry="3" fill="#ffffff" opacity="0.2"/>
    <ellipse cx="180" cy="420" rx="25" ry="2" fill="#ffffff" opacity="0.15"/>
  </g>

  <!-- Red center line -->
  <line x1="0" y1="350" x2="400" y2="350" stroke="#cc2936" stroke-width="3" opacity="0.25" stroke-dasharray="12,8"/>
  <!-- Blue lines -->
  <line x1="0" y1="300" x2="400" y2="300" stroke="#1e5aa8" stroke-width="2.5" opacity="0.2"/>
  <line x1="0" y1="400" x2="400" y2="400" stroke="#1e5aa8" stroke-width="2.5" opacity="0.2"/>

  <!-- Partial faceoff circle -->
  <circle cx="340" cy="350" r="40" fill="none" stroke="#cc2936" stroke-width="1.5" opacity="0.15"/>


  <!-- ============ ZAMBONI MACHINE (masked for face hole) ============ -->
  <g class="zamboni-body" mask="url(#face-mask)">

    <!-- === REAR: Water tank / conditioner === -->
    <rect x="55" y="230" width="130" height="95" rx="8" fill="url(#zamboni-white)" stroke="#b0b8c1" stroke-width="1.5"/>
    <!-- Tank top curve -->
    <path d="M60,235 Q60,220 85,218 L150,218 Q175,220 175,235" fill="url(#tank-grad)" stroke="#b0b8c1" stroke-width="1"/>
    <!-- Water fill cap -->
    <rect x="100" y="212" width="30" height="10" rx="3" fill="#666" stroke="#444" stroke-width="1"/>
    <rect x="110" y="208" width="10" height="6" rx="2" fill="#888"/>
    <!-- Tank panel lines -->
    <line x1="95" y1="235" x2="95" y2="320" stroke="#c5ced6" stroke-width="0.8"/>
    <line x1="140" y1="235" x2="140" y2="320" stroke="#c5ced6" stroke-width="0.8"/>
    <!-- Blue stripe on tank -->
    <rect x="55" y="280" width="130" height="18" fill="url(#zamboni-blue)" opacity="0.9"/>
    <!-- Red accent line -->
    <rect x="55" y="275" width="130" height="5" fill="#cc2936"/>
    <!-- Conditioner pipes -->
    <g stroke="#888" stroke-width="2" fill="none">
      <path d="M70,320 L70,335 Q70,342 78,342 L90,342"/>
      <path d="M160,320 L160,335 Q160,342 152,342 L140,342"/>
    </g>
    <!-- Snow auger housing -->
    <rect x="42" y="310" width="20" height="25" rx="4" fill="#555" stroke="#333" stroke-width="1"/>
    <rect x="38" y="330" width="28" height="8" rx="2" fill="url(#rubber-grad)"/>
    <!-- Auger spiral lines -->
    <line x1="47" y1="315" x2="57" y2="325" stroke="#777" stroke-width="1.5"/>
    <line x1="47" y1="322" x2="57" y2="332" stroke="#777" stroke-width="1.5"/>

    <!-- === MIDDLE: Chassis / cab floor === -->
    <rect x="175" y="290" width="100" height="40" rx="3" fill="#d0d5da" stroke="#b0b8c1" stroke-width="1"/>
    <rect x="175" y="305" width="100" height="12" fill="url(#zamboni-blue)" opacity="0.8"/>

    <!-- === CAB STRUCTURE === -->
    <path d="M190,180 L190,290 L280,290 L280,180 Q280,168 270,165 L200,165 Q190,168 190,180 Z" fill="url(#zamboni-white)" stroke="#b0b8c1" stroke-width="1.5"/>
    <!-- Windshield -->
    <path d="M195,182 L195,260 L275,260 L275,182 Q275,174 268,172 L202,172 Q195,174 195,182 Z" fill="#9ec5e0" opacity="0.35" stroke="#6e8ea8" stroke-width="1"/>
    <!-- Windshield reflection -->
    <path d="M200,185 L210,260 L205,260 L195,185 Z" fill="#ffffff" opacity="0.2"/>

    <!-- Seat -->
    <rect x="210" y="238" width="45" height="22" rx="5" fill="url(#seat-grad)"/>
    <rect x="215" y="218" width="35" height="24" rx="4" fill="url(#seat-grad)"/>
    <rect x="215" y="242" width="35" height="8" rx="3" fill="#3d3d3d"/>

    <!-- Steering wheel -->
    <ellipse cx="210" cy="225" rx="12" ry="11" fill="none" stroke="#333" stroke-width="3"/>
    <line x1="210" y1="225" x2="210" y2="250" stroke="#333" stroke-width="2.5"/>
    <circle cx="210" cy="225" r="3" fill="#444"/>

    <!-- Dashboard -->
    <rect x="195" y="258" width="80" height="14" rx="3" fill="#444"/>
    <circle cx="210" cy="265" r="3" fill="#2ecc71" opacity="0.8"/>
    <circle cx="222" cy="265" r="3" fill="#e74c3c" opacity="0.6"/>
    <circle cx="234" cy="265" r="3" fill="#f39c12" opacity="0.7"/>
    <rect x="248" y="261" width="20" height="7" rx="1" fill="#1a1a1a"/>
    <rect x="250" y="262.5" width="16" height="4" rx="1" fill="#00aa44" opacity="0.5"/>

    <!-- === DRIVER === -->
    <!-- Jacket body -->
    <path d="M210,185 L210,240 L260,240 L260,185 Q258,170 235,168 Q212,170 210,185 Z" fill="url(#jacket-grad)"/>
    <!-- Collar -->
    <path d="M218,175 Q235,168 252,175 L250,182 Q235,176 220,182 Z" fill="#1a4a8a"/>
    <!-- Zipper -->
    <line x1="235" y1="178" x2="235" y2="238" stroke="#0e3670" stroke-width="1"/>
    <!-- Pocket -->
    <rect x="242" y="205" width="14" height="10" rx="2" fill="none" stroke="#0e3670" stroke-width="0.8"/>
    <!-- Left arm to steering wheel -->
    <path d="M210,195 L198,215 L205,228 L212,225" fill="url(#jacket-grad)" stroke="#0e3670" stroke-width="1"/>
    <!-- Right arm -->
    <path d="M260,195 L268,215 L262,230 L255,228" fill="url(#jacket-grad)" stroke="#0e3670" stroke-width="1"/>
    <!-- Gloves -->
    <ellipse cx="205" cy="228" rx="6" ry="5" fill="#333"/>
    <ellipse cx="262" cy="230" rx="6" ry="5" fill="#333"/>

    <!-- Cap crown -->
    <path d="M210,120 Q210,105 235,103 Q260,105 260,120 L260,138 Q260,142 255,144 L235,148 L215,144 Q210,142 210,138 Z" fill="#1d3557"/>
    <!-- Cap brim -->
    <path d="M208,138 Q200,136 198,140 Q196,146 210,148 L260,148 Q272,146 270,140 Q268,136 260,138 Z" fill="#0d1b2a"/>
    <!-- Cap emblem -->
    <circle cx="235" cy="122" r="7" fill="#cc2936"/>
    <text x="235" y="126" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Z</text>
    <!-- Ear flaps -->
    <rect x="208" y="132" width="6" height="12" rx="3" fill="#1d3557"/>
    <rect x="256" y="132" width="6" height="12" rx="3" fill="#1d3557"/>

    <!-- === FRONT SECTION === -->
    <!-- Front hood -->
    <path d="M275,240 L340,245 Q355,248 355,260 L355,330 Q355,340 345,340 L275,340 L275,240 Z" fill="url(#zamboni-white)" stroke="#b0b8c1" stroke-width="1.5"/>
    <!-- Front blue panel -->
    <rect x="280" y="270" width="70" height="40" rx="4" fill="url(#zamboni-blue)"/>
    <!-- Red stripe -->
    <rect x="280" y="265" width="70" height="5" fill="#cc2936"/>
    <!-- Headlight -->
    <ellipse cx="348" cy="275" rx="8" ry="10" fill="#f7dc6f" stroke="#d4ac0d" stroke-width="1"/>
    <ellipse cx="348" cy="275" rx="5" ry="7" fill="#fef9e7" opacity="0.8"/>
    <!-- Front bumper -->
    <rect x="340" y="325" width="20" height="18" rx="4" fill="url(#rubber-grad)"/>
    <!-- Front grill -->
    <rect x="342" y="295" width="12" height="25" rx="2" fill="#444"/>
    <line x1="344" y1="300" x2="352" y2="300" stroke="#666" stroke-width="1"/>
    <line x1="344" y1="305" x2="352" y2="305" stroke="#666" stroke-width="1"/>
    <line x1="344" y1="310" x2="352" y2="310" stroke="#666" stroke-width="1"/>
    <line x1="344" y1="315" x2="352" y2="315" stroke="#666" stroke-width="1"/>

    <!-- Exhaust pipe -->
    <rect x="275" y="218" width="6" height="25" rx="2" fill="#777" stroke="#555" stroke-width="0.8"/>
    <ellipse cx="278" cy="216" rx="4" ry="3" fill="#555"/>
    <!-- Smoke wisps -->
    <g opacity="0.15" fill="none" stroke="#aaa" stroke-width="1.5">
      <path d="M278,212 Q282,205 276,198 Q270,190 276,182"/>
      <path d="M280,210 Q286,200 280,192"/>
    </g>

    <!-- Side mirror -->
    <rect x="275" y="190" width="4" height="20" rx="1" fill="#666"/>
    <ellipse cx="279" cy="188" rx="6" ry="4" fill="#555" stroke="#444" stroke-width="0.8"/>
    <ellipse cx="279" cy="188" rx="4" ry="2.5" fill="#8ab4d0" opacity="0.4"/>

    <!-- === WHEELS === -->
    <!-- Rear wheel housing -->
    <rect x="72" y="328" width="55" height="22" rx="3" fill="#444"/>
    <!-- Rear wheel left -->
    <g class="wheel">
      <circle cx="85" cy="348" r="16" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="85" cy="348" r="10" fill="#444"/>
      <circle cx="85" cy="348" r="4" fill="#666"/>
      <line x1="85" y1="334" x2="85" y2="362" stroke="#555" stroke-width="1.5"/>
      <line x1="71" y1="348" x2="99" y2="348" stroke="#555" stroke-width="1.5"/>
    </g>
    <!-- Rear wheel right -->
    <g class="wheel">
      <circle cx="118" cy="348" r="16" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="118" cy="348" r="10" fill="#444"/>
      <circle cx="118" cy="348" r="4" fill="#666"/>
      <line x1="118" y1="334" x2="118" y2="362" stroke="#555" stroke-width="1.5"/>
      <line x1="104" y1="348" x2="132" y2="348" stroke="#555" stroke-width="1.5"/>
    </g>

    <!-- Front wheel housing -->
    <rect x="295" y="332" width="45" height="18" rx="3" fill="#444"/>
    <!-- Front wheel -->
    <g class="wheel">
      <circle cx="318" cy="350" r="14" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="318" cy="350" r="9" fill="#444"/>
      <circle cx="318" cy="350" r="3.5" fill="#666"/>
      <line x1="318" y1="338" x2="318" y2="362" stroke="#555" stroke-width="1.5"/>
      <line x1="306" y1="350" x2="330" y2="350" stroke="#555" stroke-width="1.5"/>
    </g>

    <!-- Snow blade at rear bottom -->
    <rect x="38" y="340" width="30" height="6" rx="1" fill="#999" stroke="#777" stroke-width="0.8"/>
    <rect x="35" y="345" width="36" height="3" rx="1" fill="#bbb"/>

    <!-- Water spray from conditioner -->
    <g opacity="0.2">
      <ellipse cx="50" cy="360" rx="15" ry="4" fill="#85c1e9"/>
      <ellipse cx="48" cy="368" rx="20" ry="3" fill="#85c1e9"/>
    </g>

    <!-- Safety beacon on cab roof -->
    <rect x="228" y="158" width="14" height="8" rx="3" fill="#f39c12"/>
    <ellipse cx="235" cy="157" rx="8" ry="4" fill="#f5b041" opacity="0.8"/>
    <ellipse cx="235" cy="157" rx="5" ry="2.5" fill="#fef9e7" opacity="0.5"/>

  </g>
  <!-- End masked Zamboni group -->

  <!-- Face hole border ring -->
  <circle cx="235" cy="145" r="41" fill="none" stroke="#0d1b2a" stroke-width="1.5" opacity="0.4"/>

  <!-- ============ SHADOW ON ICE ============ -->
  <ellipse cx="195" cy="370" rx="130" ry="12" fill="#1a4a8a" opacity="0.08"/>

  <!-- ============ CAPTION ============ -->
