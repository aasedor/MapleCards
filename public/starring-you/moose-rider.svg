<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Face cutout mask -->
    <mask id="face-cutout">
      <rect width="400" height="500" fill="white"/>
      <circle cx="200" cy="95" r="40" fill="black"/>
    </mask>

    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#B0DAF1"/>
      <stop offset="100%" stop-color="#DCE9F5"/>
    </linearGradient>

    <!-- Mountain gradient -->
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B8FA1"/>
      <stop offset="100%" stop-color="#9AACBC"/>
    </linearGradient>
    <linearGradient id="mountainGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A7F91"/>
      <stop offset="100%" stop-color="#8A9DAD"/>
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7C59"/>
      <stop offset="100%" stop-color="#3B6B48"/>
    </linearGradient>

    <!-- Forest floor gradient -->
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8A5C"/>
      <stop offset="50%" stop-color="#4E7B4E"/>
      <stop offset="100%" stop-color="#3D6B3D"/>
    </linearGradient>

    <!-- Moose body gradient -->
    <linearGradient id="mooseBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B5232"/>
      <stop offset="50%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#5C3A1E"/>
    </linearGradient>

    <!-- Moose dark shading -->
    <linearGradient id="mooseBellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#4A2E18"/>
    </linearGradient>

    <!-- Antler gradient -->
    <linearGradient id="antlerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#A8874D"/>
    </linearGradient>

    <!-- Plaid pattern for flannel shirt -->
    <pattern id="plaidPattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#c1121f"/>
      <rect x="0" y="0" width="8" height="8" fill="#1a1a1a" opacity="0.55"/>
      <rect x="8" y="8" width="8" height="8" fill="#1a1a1a" opacity="0.55"/>
      <rect x="0" y="0" width="16" height="2" fill="#e63946" opacity="0.3"/>
      <rect x="0" y="8" width="16" height="2" fill="#e63946" opacity="0.3"/>
      <rect x="0" y="0" width="2" height="16" fill="#e63946" opacity="0.3"/>
      <rect x="8" y="0" width="2" height="16" fill="#e63946" opacity="0.3"/>
    </pattern>

    <!-- Toque knit pattern -->
    <pattern id="toqueKnit" x="0" y="0" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="4" fill="#c1121f"/>
      <rect x="0" y="0" width="3" height="2" fill="#e63946" opacity="0.4"/>
      <rect x="3" y="2" width="3" height="2" fill="#e63946" opacity="0.4"/>
    </pattern>

    <!-- Cloud filter for softness -->
    <filter id="cloudSoft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <!-- Tree shadow filter -->
    <filter id="treeShadow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <style>
    @keyframes bobRide {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      30% { transform: translateY(-5px) rotate(-0.5deg); }
      60% { transform: translateY(-2px) rotate(0.3deg); }
    }
    @keyframes legStep {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      75% { transform: rotate(-3deg); }
    }
    @keyframes cloudDrift {
      0% { transform: translateX(0px); }
      50% { transform: translateX(8px); }
      100% { transform: translateX(0px); }
    }
    @keyframes tailSwish {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }
    .ride-group {
      animation: bobRide 1.8s ease-in-out infinite;
      transform-origin: 200px 300px;
    }
    .cloud1 { animation: cloudDrift 12s ease-in-out infinite; }
    .cloud2 { animation: cloudDrift 15s ease-in-out infinite reverse; }
    .cloud3 { animation: cloudDrift 10s ease-in-out infinite 3s; }
    .moose-tail {
      animation: tailSwish 2.5s ease-in-out infinite;
      transform-origin: 100px 265px;
    }
  </style>

  <!-- === SKY === -->
  <rect width="400" height="500" fill="url(#skyGrad)"/>

  <!-- === CLOUDS === -->
  <g class="cloud1" opacity="0.85">
    <ellipse cx="80" cy="50" rx="40" ry="16" fill="white" filter="url(#cloudSoft)"/>
    <ellipse cx="65" cy="45" rx="25" ry="12" fill="white" filter="url(#cloudSoft)"/>
    <ellipse cx="100" cy="47" rx="28" ry="13" fill="white" filter="url(#cloudSoft)"/>
  </g>
  <g class="cloud2" opacity="0.7">
    <ellipse cx="310" cy="35" rx="35" ry="14" fill="white" filter="url(#cloudSoft)"/>
    <ellipse cx="295" cy="30" rx="22" ry="10" fill="white" filter="url(#cloudSoft)"/>
    <ellipse cx="330" cy="32" rx="24" ry="11" fill="white" filter="url(#cloudSoft)"/>
  </g>
  <g class="cloud3" opacity="0.6">
    <ellipse cx="190" cy="25" rx="30" ry="11" fill="white" filter="url(#cloudSoft)"/>
    <ellipse cx="210" cy="22" rx="20" ry="9" fill="white" filter="url(#cloudSoft)"/>
  </g>

  <!-- === DISTANT MOUNTAINS === -->
  <polygon points="-20,220 60,120 140,220" fill="url(#mountainGrad2)" opacity="0.5"/>
  <polygon points="50,220 160,100 270,220" fill="url(#mountainGrad)" opacity="0.6"/>
  <polygon points="180,220 290,90 400,220" fill="url(#mountainGrad2)" opacity="0.55"/>
  <polygon points="300,220 380,130 420,220" fill="url(#mountainGrad)" opacity="0.5"/>
  <!-- Snow caps -->
  <polygon points="145,108 160,100 175,112 160,118" fill="white" opacity="0.7"/>
  <polygon points="275,98 290,90 305,100 290,108" fill="white" opacity="0.7"/>

  <!-- === FAR BACKGROUND TREES === -->
  <g opacity="0.35">
    <polygon points="10,260 18,180 26,260" fill="#1B4332"/>
    <polygon points="30,260 40,170 50,260" fill="#2D6A4F"/>
    <polygon points="55,260 62,190 69,260" fill="#1B4332"/>
    <polygon points="340,260 350,175 360,260" fill="#2D6A4F"/>
    <polygon points="365,260 373,185 381,260" fill="#1B4332"/>
    <polygon points="385,260 392,195 399,260" fill="#2D6A4F"/>
  </g>

  <!-- === MID BACKGROUND TREES === -->
  <g opacity="0.5">
    <!-- Left cluster -->
    <polygon points="0,320 15,210 30,320" fill="#1B4332"/>
    <polygon points="12,310 15,215 18,310" fill="#2D6A4F"/>
    <polygon points="25,330 42,195 59,330" fill="#2D6A4F"/>
    <polygon points="34,320 42,200 50,320" fill="#1B4332"/>
    <polygon points="50,340 62,220 74,340" fill="#1B4332"/>

    <!-- Right cluster -->
    <polygon points="330,330 345,200 360,330" fill="#2D6A4F"/>
    <polygon points="338,320 345,205 352,320" fill="#1B4332"/>
    <polygon points="355,340 370,210 385,340" fill="#1B4332"/>
    <polygon points="375,330 387,225 399,330" fill="#2D6A4F"/>
  </g>

  <!-- === GROUND / FOREST FLOOR === -->
  <ellipse cx="200" cy="410" rx="220" ry="50" fill="url(#floorGrad)"/>
  <rect x="0" y="390" width="400" height="110" fill="url(#groundGrad)" opacity="0.85"/>

  <!-- Grass tufts -->
  <g opacity="0.6" fill="#5A9A5C">
    <path d="M30,395 Q33,382 36,395" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M34,395 Q38,380 42,395" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M90,400 Q93,388 96,400" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M94,400 Q98,386 102,400" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M310,398 Q313,385 316,398" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M314,398 Q318,383 322,398" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M370,395 Q373,383 376,395" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M150,405 Q153,393 156,405" stroke="#4A8A4C" stroke-width="1" fill="none"/>
    <path d="M250,403 Q253,391 256,403" stroke="#4A8A4C" stroke-width="1" fill="none"/>
  </g>

  <!-- Fallen leaves -->
  <g opacity="0.5">
    <ellipse cx="55" cy="400" rx="4" ry="2" fill="#C1440E" transform="rotate(-20 55 400)"/>
    <ellipse cx="120" cy="406" rx="3" ry="1.5" fill="#D4A017" transform="rotate(15 120 406)"/>
    <ellipse cx="280" cy="402" rx="4" ry="2" fill="#C1440E" transform="rotate(30 280 402)"/>
    <ellipse cx="350" cy="398" rx="3" ry="1.5" fill="#D4A017" transform="rotate(-10 350 398)"/>
    <ellipse cx="180" cy="408" rx="3" ry="1.5" fill="#B8860B" transform="rotate(45 180 408)"/>
    <ellipse cx="220" cy="405" rx="3.5" ry="1.5" fill="#C1440E" transform="rotate(-25 220 405)"/>
  </g>

  <!-- === FOREGROUND TREES (left) === -->
  <g opacity="0.7">
    <!-- Tree trunk -->
    <rect x="3" y="280" width="8" height="115" fill="#5C4033"/>
    <!-- Layered branches -->
    <polygon points="-15,370 7,340 29,370" fill="#1B5E20"/>
    <polygon points="-12,340 7,305 26,340" fill="#2E7D32"/>
    <polygon points="-8,310 7,275 22,310" fill="#388E3C"/>
    <polygon points="-4,285 7,255 18,285" fill="#43A047"/>
  </g>

  <!-- Foreground tree (right) -->
  <g opacity="0.7">
    <rect x="385" y="290" width="8" height="105" fill="#5C4033"/>
    <polygon points="372,375 389,345 406,375" fill="#1B5E20"/>
    <polygon points="375,345 389,310 403,345" fill="#2E7D32"/>
    <polygon points="378,315 389,280 400,315" fill="#388E3C"/>
    <polygon points="381,290 389,260 397,290" fill="#43A047"/>
  </g>

  <!-- ============================================ -->
  <!-- === MAIN RIDING GROUP (with bob animation) === -->
  <!-- ============================================ -->
  <g class="ride-group" mask="url(#face-cutout)">

    <!-- === MOOSE === -->

    <!-- Moose shadow on ground -->
    <ellipse cx="205" cy="395" rx="95" ry="12" fill="#2D4A2D" opacity="0.3"/>

    <!-- Back legs -->
    <!-- Back-left leg (further) -->
    <path d="M128,318 L120,355 L118,380 L115,390" fill="#5C3A1E" stroke="#4A2E18" stroke-width="2"/>
    <path d="M138,316 L132,355 L130,380 L128,390" fill="#6B4226" stroke="#4A2E18" stroke-width="2"/>
    <!-- Hooves -->
    <rect x="111" y="387" width="18" height="8" rx="3" fill="#2C2C2C"/>
    <rect x="124" y="387" width="18" height="8" rx="3" fill="#333"/>

    <!-- Front legs -->
    <!-- Front-left leg (further) -->
    <path d="M265,325 L268,358 L272,380 L274,390" fill="#5C3A1E" stroke="#4A2E18" stroke-width="2"/>
    <path d="M275,322 L280,355 L283,380 L285,390" fill="#6B4226" stroke="#4A2E18" stroke-width="2"/>
    <!-- Hooves -->
    <rect x="270" y="387" width="18" height="8" rx="3" fill="#2C2C2C"/>
    <rect x="281" y="387" width="18" height="8" rx="3" fill="#333"/>

    <!-- Moose main body -->
    <ellipse cx="200" cy="290" rx="105" ry="55" fill="url(#mooseBodyGrad)"/>
    <!-- Belly shading -->
    <ellipse cx="200" cy="310" rx="85" ry="30" fill="url(#mooseBellyGrad)" opacity="0.4"/>
    <!-- Back hump / shoulder -->
    <ellipse cx="240" cy="260" rx="40" ry="25" fill="#7B5232" opacity="0.6"/>

    <!-- Moose tail -->
    <g class="moose-tail">
      <ellipse cx="97" cy="268" rx="12" ry="7" fill="#5C3A1E" transform="rotate(-15 97 268)"/>
    </g>

    <!-- Moose neck -->
    <path d="M268,260 Q295,235 290,200 Q287,185 280,175" fill="#6B4226" stroke="#4A2E18" stroke-width="2"/>
    <path d="M255,255 Q278,230 275,200 Q272,185 267,178" fill="#7B5232" stroke="none"/>
    <!-- Dewlap / beard -->
    <path d="M272,200 Q265,218 268,230 Q275,225 278,210" fill="#5C3A1E" opacity="0.7"/>

    <!-- Moose head -->
    <ellipse cx="290" cy="178" rx="33" ry="26" fill="#7B5232" stroke="#4A2E18" stroke-width="1.5"/>
    <!-- Head highlight -->
    <ellipse cx="286" cy="173" rx="18" ry="14" fill="#8B6242" opacity="0.4"/>

    <!-- Moose muzzle -->
    <ellipse cx="318" cy="186" rx="20" ry="16" fill="#8B6242" stroke="#4A2E18" stroke-width="1.5"/>
    <!-- Muzzle highlight -->
    <ellipse cx="320" cy="183" rx="12" ry="9" fill="#9B7252" opacity="0.5"/>
    <!-- Nostrils -->
    <ellipse cx="328" cy="184" rx="3" ry="2.5" fill="#3A2010"/>
    <ellipse cx="322" cy="186" rx="2.5" ry="2" fill="#3A2010"/>

    <!-- Moose eye -->
    <ellipse cx="296" cy="172" rx="6" ry="5.5" fill="white"/>
    <circle cx="297" cy="172" r="3.5" fill="#1a1a1a"/>
    <circle cx="298" cy="171" r="1.2" fill="white"/>

    <!-- Moose ear -->
    <ellipse cx="272" cy="158" rx="8" ry="14" fill="#7B5232" stroke="#4A2E18" stroke-width="1.5" transform="rotate(-15 272 158)"/>
    <ellipse cx="272" cy="158" rx="4" ry="9" fill="#9B7252" opacity="0.4" transform="rotate(-15 272 158)"/>

    <!-- === ANTLERS === -->
    <!-- Left antler - palmate style -->
    <g fill="none" stroke="url(#antlerGrad)" stroke-linecap="round">
      <path d="M276,155 L265,125 L250,115" stroke-width="6"/>
      <path d="M265,125 L260,105 L248,98" stroke-width="5"/>
      <path d="M260,105 L270,95" stroke-width="4"/>
      <path d="M265,125 L278,108" stroke-width="5"/>
      <!-- Palm flat area -->
      <path d="M248,98 Q240,105 250,115" stroke-width="8" opacity="0.7"/>
    </g>
    <!-- Right antler -->
    <g fill="none" stroke="url(#antlerGrad)" stroke-linecap="round">
      <path d="M298,155 L312,128 L328,120" stroke-width="6"/>
      <path d="M312,128 L310,108 L320,100" stroke-width="5"/>
      <path d="M310,108 L300,100" stroke-width="4"/>
      <path d="M312,128 L300,112" stroke-width="5"/>
      <!-- Palm flat area -->
      <path d="M320,100 Q330,108 328,120" stroke-width="8" opacity="0.7"/>
    </g>

    <!-- === SADDLE BLANKET === -->
    <path d="M155,250 Q200,242 245,250 L250,275 Q240,295 200,298 Q160,295 150,275 Z" fill="#c1121f" stroke="#8B0000" stroke-width="1"/>
    <path d="M158,265 Q200,260 242,265" stroke="#FFD700" stroke-width="3" fill="none"/>
    <path d="M156,258 Q200,253 244,258" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M157,272 Q200,267 243,272" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- === RIDER === -->

    <!-- Rider legs (jeans) - straddling moose -->
    <!-- Left leg -->
    <path d="M183,240 Q170,265 162,290 Q158,305 160,320" fill="#2B4C7E" stroke="#1A3A5C" stroke-width="1.5"/>
    <path d="M192,240 Q180,265 174,290 Q172,305 173,320" fill="#345E94" stroke="#1A3A5C" stroke-width="1.5"/>
    <!-- Right leg -->
    <path d="M217,240 Q230,265 238,290 Q242,305 240,320" fill="#345E94" stroke="#1A3A5C" stroke-width="1.5"/>
    <path d="M208,240 Q220,265 226,290 Q228,305 228,320" fill="#2B4C7E" stroke="#1A3A5C" stroke-width="1.5"/>

    <!-- Boots -->
    <path d="M155,317 L175,317 Q178,317 178,320 L178,330 Q178,333 175,333 L150,333 Q147,333 147,330 L147,325 Q147,317 155,317 Z" fill="#5C3318" stroke="#3A1F0D" stroke-width="1"/>
    <rect x="148" y="317" width="30" height="4" rx="1" fill="#6B4020"/>
    <path d="M225,317 L245,317 Q248,317 248,320 L248,330 Q248,333 245,333 L220,333 Q217,333 217,330 L217,325 Q217,317 225,317 Z" fill="#5C3318" stroke="#3A1F0D" stroke-width="1"/>
    <rect x="218" y="317" width="30" height="4" rx="1" fill="#6B4020"/>

    <!-- Rider torso (plaid flannel shirt) -->
    <path d="M178,148 Q200,145 222,148 L225,240 Q200,245 175,240 Z" fill="url(#plaidPattern)" stroke="#6B1015" stroke-width="1"/>
    <!-- Collar -->
    <path d="M188,150 L195,158 L200,152 L205,158 L212,150" fill="#c1121f" stroke="#8B0000" stroke-width="1"/>

    <!-- Rider arms (plaid sleeves) -->
    <!-- Left arm reaching forward -->
    <path d="M178,160 Q160,185 148,215 Q145,222 148,228" fill="url(#plaidPattern)" stroke="#6B1015" stroke-width="1"/>
    <path d="M175,158 Q158,180 146,210" stroke="#c1121f" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Left hand -->
    <circle cx="147" cy="226" r="8" fill="#D4956A"/>
    <path d="M142,220 Q140,226 143,230" stroke="#C08050" stroke-width="1.5" fill="none"/>

    <!-- Right arm reaching forward -->
    <path d="M222,160 Q242,182 258,208 Q262,215 260,220" fill="url(#plaidPattern)" stroke="#6B1015" stroke-width="1"/>
    <path d="M225,158 Q245,178 260,206" stroke="#c1121f" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Right hand -->
    <circle cx="260" cy="218" r="8" fill="#D4956A"/>
    <path d="M255,212 Q253,218 256,222" stroke="#C08050" stroke-width="1.5" fill="none"/>

    <!-- Rider neck -->
    <rect x="192" y="135" width="16" height="16" rx="4" fill="#D4956A"/>

    <!-- === HEAD AREA (masked for face cutout) === -->

    <!-- Head shape behind face hole -->
    <circle cx="200" cy="95" r="42" fill="#D4956A"/>

    <!-- Ears (outside the face hole radius) -->
    <ellipse cx="157" cy="98" rx="8" ry="10" fill="#D4956A" stroke="#C08050" stroke-width="1"/>
    <ellipse cx="157" cy="98" rx="4" ry="6" fill="#E0A878" opacity="0.5"/>
    <ellipse cx="243" cy="98" rx="8" ry="10" fill="#D4956A" stroke="#C08050" stroke-width="1"/>
    <ellipse cx="243" cy="98" rx="4" ry="6" fill="#E0A878" opacity="0.5"/>

    <!-- === TOQUE / BEANIE HAT === -->
    <!-- Main toque body -->
    <path d="M165,82 Q168,55 200,48 Q232,55 235,82 Q235,88 232,90 Q200,95 168,90 Q165,88 165,82 Z" fill="url(#toqueKnit)" stroke="#8B0000" stroke-width="1"/>
    <!-- Toque fold/brim -->
    <path d="M163,90 Q165,82 168,80 Q200,74 232,80 Q235,82 237,90 Q235,98 232,100 Q200,106 168,100 Q165,98 163,90 Z" fill="#e63946" stroke="#c1121f" stroke-width="1"/>
    <!-- White stripe on brim -->
    <path d="M166,88 Q200,82 234,88 Q234,94 232,96 Q200,102 168,96 Q166,94 166,88 Z" fill="white" opacity="0.85"/>
    <!-- Knit texture lines on brim -->
    <path d="M170,92 Q200,87 230,92" stroke="#ddd" stroke-width="0.5" fill="none" opacity="0.5"/>
    <path d="M168,95 Q200,90 232,95" stroke="#ddd" stroke-width="0.5" fill="none" opacity="0.5"/>
    <!-- Pompom -->
    <circle cx="200" cy="48" r="10" fill="white" stroke="#ddd" stroke-width="0.5"/>
    <circle cx="197" cy="45" r="3" fill="#f0f0f0" opacity="0.6"/>
    <circle cx="203" cy="50" r="2.5" fill="#f0f0f0" opacity="0.6"/>
    <circle cx="200" cy="44" r="2" fill="#f5f5f5" opacity="0.5"/>
  </g>

  <!-- Face hole indicator ring (outside mask so it shows) -->
  <circle cx="200" cy="95" r="40" fill="none" stroke="#c1121f" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.4"/>

  <!-- === FOREGROUND DETAILS === -->

  <!-- Small rocks on ground -->
  <ellipse cx="70" cy="400" rx="6" ry="3" fill="#8B8B7A" opacity="0.4"/>
  <ellipse cx="340" cy="396" rx="5" ry="2.5" fill="#8B8B7A" opacity="0.4"/>
  <ellipse cx="160" cy="410" rx="4" ry="2" fill="#7B7B6A" opacity="0.3"/>

  <!-- More fallen leaves in foreground -->
  <g opacity="0.55">
    <ellipse cx="45" cy="405" rx="5" ry="2.5" fill="#D4A017" transform="rotate(25 45 405)"/>
    <ellipse cx="130" cy="412" rx="4" ry="2" fill="#C1440E" transform="rotate(-35 130 412)"/>
    <ellipse cx="275" cy="408" rx="5" ry="2" fill="#B8860B" transform="rotate(15 275 408)"/>
    <ellipse cx="330" cy="404" rx="4" ry="2" fill="#C1440E" transform="rotate(-20 330 404)"/>
    <ellipse cx="200" cy="415" rx="4.5" ry="2" fill="#D4A017" transform="rotate(40 200 415)"/>
  </g>

  <!-- Small foreground grass tufts -->
  <g opacity="0.5" stroke="#3D7A3D" stroke-width="1.2" fill="none">
    <path d="M60,398 Q62,388 58,378"/>
    <path d="M64,398 Q67,386 63,376"/>
    <path d="M345,396 Q347,386 343,376"/>
    <path d="M349,396 Q352,384 348,374"/>
    <path d="M195,412 Q197,403 193,395"/>
    <path d="M199,412 Q202,401 198,393"/>
  </g>

  <!-- === CAPTION === -->
  <text x="200" y="460" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="bold" fill="#e63946"
        letter-spacing="1.2" text-decoration="none">
    LIVING THEIR BEST CANADIAN LIFE
  </text>
</svg>