<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Face hole mask: white = visible, black = transparent cutout -->
    <mask id="faceHoleMask">
      <rect width="400" height="500" fill="white"/>
      <circle cx="200" cy="105" r="45" fill="black"/>
    </mask>

    <!-- Ice surface gradient -->
    <linearGradient id="iceGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6eaf8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ebf5fb" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>

    <!-- Rink line gradient -->
    <linearGradient id="redLineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0"/>
      <stop offset="20%" stop-color="#e63946" stop-opacity="1"/>
      <stop offset="80%" stop-color="#e63946" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </linearGradient>

    <!-- Jersey gradient for depth -->
    <linearGradient id="jerseyGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#24437a"/>
      <stop offset="100%" stop-color="#1d3557"/>
    </linearGradient>

    <!-- Helmet gradient -->
    <linearGradient id="helmetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Goal net mesh pattern -->
    <pattern id="netMesh" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 0L12 12M12 0L0 12" stroke="#cccccc" stroke-width="0.8" fill="none"/>
    </pattern>

    <!-- Skate blade gradient -->
    <linearGradient id="skateBladeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#999999"/>
      <stop offset="50%" stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>

    <!-- Stick gradient -->
    <linearGradient id="stickShaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1506"/>
      <stop offset="50%" stop-color="#4a2910"/>
      <stop offset="100%" stop-color="#2a1506"/>
    </linearGradient>

    <!-- Puck gradient -->
    <radialGradient id="puckGrad" cx="0.4" cy="0.3">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>

    <!-- Spotlight glow -->
    <radialGradient id="spotGlow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes celebrateBounce {
      0%, 100% { transform: translateY(0); }
      15% { transform: translateY(-6px); }
      30% { transform: translateY(0); }
      45% { transform: translateY(-4px); }
      60% { transform: translateY(0); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(30px) rotate(360deg); opacity: 0.3; }
    }
    @keyframes goalPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    .body-group {
      animation: celebrateBounce 1.8s ease-in-out infinite;
    }
    .confetti-piece {
      animation: confettiFall 2.5s ease-in-out infinite;
    }
    .goal-text {
      animation: goalPulse 1.2s ease-in-out infinite;
    }
  </style>

  <!-- Background: rink atmosphere -->
  <rect width="400" height="500" fill="#0a1628"/>
  <ellipse cx="200" cy="200" rx="280" ry="260" fill="url(#spotGlow)"/>

  <!-- Arena boards (background) -->
  <rect x="10" y="380" width="380" height="12" rx="3" fill="#3a3a3a"/>
  <rect x="10" y="380" width="380" height="3" rx="1" fill="#555555"/>

  <!-- Goal net (background) -->
  <g transform="translate(260, 340)">
    <!-- Net frame -->
    <path d="M0 0 L0 55 Q35 65 70 55 L70 0" fill="none" stroke="#dd3333" stroke-width="4" stroke-linecap="round"/>
    <!-- Net crossbar -->
    <line x1="0" y1="0" x2="70" y2="0" stroke="#dd3333" stroke-width="4" stroke-linecap="round"/>
    <!-- Net mesh -->
    <path d="M2 2 L2 53 Q35 62 68 53 L68 2 Z" fill="url(#netMesh)" opacity="0.7"/>
    <!-- Net depth lines -->
    <path d="M0 0 L-15 -12 M70 0 L85 -12 M-15 -12 L-15 42 Q35 55 85 42 L85 -12" fill="none" stroke="#dd3333" stroke-width="2.5" opacity="0.6"/>
    <path d="M-13 -10 L-13 40 Q35 52 83 40 L83 -10 Z" fill="url(#netMesh)" opacity="0.35"/>
  </g>

  <!-- Puck (on ice, near goal) -->
  <g transform="translate(285, 400)">
    <ellipse cx="0" cy="0" rx="11" ry="4" fill="url(#puckGrad)" stroke="#000000" stroke-width="0.5"/>
    <ellipse cx="-1" cy="-1" rx="4" ry="1.5" fill="#444444" opacity="0.5"/>
  </g>

  <!-- Ice surface -->
  <rect x="0" y="392" width="400" height="108" fill="url(#iceGradient)"/>
  <!-- Center red line -->
  <rect x="0" y="420" width="400" height="4" fill="url(#redLineGrad)" opacity="0.6"/>
  <!-- Blue line -->
  <rect x="0" y="408" width="400" height="2.5" fill="#1d3557" opacity="0.3"/>
  <!-- Face-off circle hint -->
  <circle cx="200" cy="440" r="30" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.25"/>
  <circle cx="200" cy="440" r="2" fill="#e63946" opacity="0.3"/>
  <!-- Ice scratches -->
  <line x1="50" y1="430" x2="120" y2="428" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
  <line x1="180" y1="445" x2="250" y2="442" stroke="#ffffff" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="435" x2="370" y2="433" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <!-- Ice reflection sheen -->
  <ellipse cx="200" cy="430" rx="160" ry="25" fill="#ffffff" opacity="0.06"/>

  <!-- Confetti pieces -->
  <rect class="confetti-piece" x="50" y="30" width="8" height="4" rx="1" fill="#e63946" transform="rotate(25 54 32)" style="animation-delay: 0s;"/>
  <rect class="confetti-piece" x="100" y="50" width="6" height="3" rx="1" fill="#ffffff" transform="rotate(-15 103 52)" style="animation-delay: 0.4s;"/>
  <rect class="confetti-piece" x="310" y="25" width="7" height="4" rx="1" fill="#e63946" transform="rotate(40 314 27)" style="animation-delay: 0.8s;"/>
  <rect class="confetti-piece" x="340" y="60" width="5" height="3" rx="1" fill="#1d3557" transform="rotate(-30 343 62)" style="animation-delay: 0.2s;"/>
  <rect class="confetti-piece" x="70" y="70" width="6" height="3" rx="1" fill="#ffd700" transform="rotate(55 73 72)" style="animation-delay: 1.2s;"/>
  <rect class="confetti-piece" x="280" y="45" width="8" height="3" rx="1" fill="#ffffff" transform="rotate(20 284 47)" style="animation-delay: 0.6s;"/>
  <rect class="confetti-piece" x="155" y="20" width="5" height="3" rx="1" fill="#ffd700" transform="rotate(-45 158 22)" style="animation-delay: 1.5s;"/>
  <rect class="confetti-piece" x="240" y="15" width="7" height="4" rx="1" fill="#e63946" transform="rotate(10 244 17)" style="animation-delay: 1.0s;"/>

  <!-- === BODY GROUP with bounce animation === -->
  <g class="body-group">

    <!-- Shadow on ice -->
    <ellipse cx="200" cy="410" rx="55" ry="8" fill="#000000" opacity="0.2"/>

    <!-- Hockey stick (behind body, left hand holds it raised) -->
    <g>
      <!-- Stick shaft -->
      <line x1="115" y1="140" x2="85" y2="360" stroke="url(#stickShaft)" stroke-width="7" stroke-linecap="round"/>
      <!-- Stick blade -->
      <path d="M85 360 Q80 365 72 368 Q60 372 55 370 Q50 368 52 362 Q55 355 68 352 Q78 350 85 355 Z" fill="#1a1a1a" stroke="#111111" stroke-width="1"/>
      <!-- Stick tape on blade -->
      <path d="M82 358 Q75 362 68 363" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M80 361 Q72 365 65 366" fill="none" stroke="#222222" stroke-width="2"/>
      <!-- Stick tape on shaft top -->
      <line x1="115" y1="140" x2="115" y2="170" stroke="#111111" stroke-width="9" stroke-linecap="round"/>
      <line x1="115" y1="142" x2="115" y2="148" stroke="#222222" stroke-width="9" stroke-linecap="round"/>
      <line x1="115" y1="154" x2="115" y2="160" stroke="#222222" stroke-width="9" stroke-linecap="round"/>
    </g>

    <!-- Left leg (hockey pants + skate) -->
    <g>
      <!-- Hockey pants leg -->
      <path d="M175 290 L168 350 Q168 355 172 358 L190 358 Q194 355 193 350 L185 290 Z" fill="#1d3557"/>
      <path d="M175 290 L185 290" stroke="#e63946" stroke-width="2"/>
      <!-- Shin pad hint -->
      <rect x="170" y="330" width="20" height="25" rx="4" fill="#1a1a1a" opacity="0.4"/>
      <!-- Skate boot -->
      <path d="M166 355 L194 355 L196 365 Q196 372 190 372 L160 372 Q155 372 155 367 L158 360 Z" fill="#1a1a1a"/>
      <path d="M168 358 L192 358" stroke="#333333" stroke-width="1"/>
      <!-- Skate blade holder -->
      <rect x="155" y="371" width="42" height="4" rx="1" fill="#444444"/>
      <!-- Skate blade -->
      <path d="M150 375 Q148 378 152 380 L200 380 Q204 378 202 375" fill="none" stroke="url(#skateBladeGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Blade shine -->
      <line x1="158" y1="379" x2="195" y2="379" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
      <!-- Lace detail -->
      <line x1="174" y1="356" x2="182" y2="356" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="173" y1="359" x2="183" y2="359" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="172" y1="362" x2="184" y2="362" stroke="#ffffff" stroke-width="0.8"/>
    </g>

    <!-- Right leg (hockey pants + skate) -->
    <g>
      <path d="M215 290 L210 350 Q210 355 214 358 L232 358 Q236 355 235 350 L225 290 Z" fill="#1d3557"/>
      <path d="M215 290 L225 290" stroke="#e63946" stroke-width="2"/>
      <rect x="212" y="330" width="20" height="25" rx="4" fill="#1a1a1a" opacity="0.4"/>
      <!-- Skate boot -->
      <path d="M208 355 L236 355 L238 365 Q238 372 232 372 L202 372 Q197 372 197 367 L200 360 Z" fill="#1a1a1a"/>
      <path d="M210 358 L234 358" stroke="#333333" stroke-width="1"/>
      <rect x="197" y="371" width="42" height="4" rx="1" fill="#444444"/>
      <path d="M192 375 Q190 378 194 380 L242 380 Q246 378 244 375" fill="none" stroke="url(#skateBladeGrad)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="200" y1="379" x2="237" y2="379" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
      <line x1="216" y1="356" x2="224" y2="356" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="215" y1="359" x2="225" y2="359" stroke="#ffffff" stroke-width="0.8"/>
      <line x1="214" y1="362" x2="226" y2="362" stroke="#ffffff" stroke-width="0.8"/>
    </g>

    <!-- Hockey pants (breezers) -->
    <path d="M160 230 Q158 250 162 290 L240 290 Q244 250 242 230 Z" fill="#1d3557"/>
    <!-- Pants stripe -->
    <path d="M160 260 Q200 258 242 260" fill="none" stroke="#e63946" stroke-width="3"/>
    <path d="M160 266 Q200 264 242 266" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Belt -->
    <rect x="160" y="228" width="82" height="8" rx="2" fill="#222222"/>

    <!-- Jersey / Torso -->
    <g>
      <!-- Main jersey body -->
      <path d="M155 145 Q148 160 148 180 L148 235 Q180 240 200 240 Q220 240 252 235 L252 180 Q252 160 245 145 Z" fill="url(#jerseyGrad)"/>

      <!-- Jersey bottom stripe -->
      <path d="M148 225 Q200 232 252 225" fill="none" stroke="#e63946" stroke-width="4"/>
      <path d="M148 220 Q200 227 252 220" fill="none" stroke="#ffffff" stroke-width="2"/>

      <!-- Jersey shoulder yoke -->
      <path d="M155 145 Q200 150 245 145 L248 170 Q200 175 152 170 Z" fill="#24437a"/>
      <path d="M152 170 Q200 175 248 170" fill="none" stroke="#e63946" stroke-width="3"/>
      <path d="M152 175 Q200 180 248 175" fill="none" stroke="#ffffff" stroke-width="1.5"/>

      <!-- Number 99 on front -->
      <text x="200" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="32" fill="#ffffff" stroke="#e63946" stroke-width="1.2">99</text>

      <!-- Jersey collar -->
      <path d="M175 143 Q200 148 225 143" fill="none" stroke="#e63946" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Left arm (raised with stick) -->
    <g>
      <!-- Upper arm / sleeve -->
      <path d="M155 148 Q130 140 118 130 Q110 124 108 132 L112 158 Q115 168 130 172 L152 175 Z" fill="url(#jerseyGrad)"/>
      <!-- Sleeve stripes -->
      <path d="M125 140 Q120 148 122 158" fill="none" stroke="#e63946" stroke-width="3"/>
      <path d="M128 138 Q123 146 125 156" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <!-- Elbow pad -->
      <ellipse cx="120" cy="155" rx="12" ry="10" fill="#222222"/>
      <ellipse cx="120" cy="155" rx="8" ry="6" fill="#333333"/>
      <!-- Glove (gripping stick) -->
      <path d="M108 128 Q100 120 105 112 Q110 105 118 110 L125 122 Q122 132 112 134 Z" fill="#1a1a1a"/>
      <path d="M105 120 Q108 115 112 114" fill="none" stroke="#e63946" stroke-width="2"/>
      <!-- Glove cuff -->
      <path d="M108 128 Q115 135 125 130" fill="none" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Right arm (raised in celebration, glove up) -->
    <g>
      <!-- Upper arm / sleeve -->
      <path d="M245 148 Q268 138 278 125 Q284 118 288 126 L286 155 Q284 168 268 174 L250 175 Z" fill="url(#jerseyGrad)"/>
      <!-- Sleeve stripes -->
      <path d="M272 138 Q278 145 276 158" fill="none" stroke="#e63946" stroke-width="3"/>
      <path d="M269 136 Q275 143 273 156" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <!-- Elbow pad -->
      <ellipse cx="280" cy="148" rx="12" ry="10" fill="#222222"/>
      <ellipse cx="280" cy="148" rx="8" ry="6" fill="#333333"/>
      <!-- Forearm going up -->
      <path d="M282 140 Q288 120 290 100 Q292 90 286 88 L280 90 Q278 100 276 125 Q275 135 278 142 Z" fill="url(#jerseyGrad)"/>
      <!-- Raised glove -->
      <path d="M278 92 Q272 78 275 70 Q280 60 290 65 Q298 70 296 82 L293 94 Q290 100 282 98 Z" fill="#1a1a1a"/>
      <path d="M278 82 Q282 75 288 74" fill="none" stroke="#e63946" stroke-width="2.5"/>
      <!-- Glove fingers spread (celebration) -->
      <path d="M280 70 L276 58 M284 66 L282 54 M289 67 L290 55 M293 72 L297 62" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
      <!-- Glove cuff -->
      <path d="M278 92 Q285 100 293 94" fill="none" stroke="#333333" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- Neck -->
    <rect x="190" y="133" width="20" height="14" rx="4" fill="#f0c8a0"/>

    <!-- Helmet group (with face hole mask) -->
    <g mask="url(#faceHoleMask)">
      <!-- Helmet shell -->
      <path d="M152 110 Q150 75 165 58 Q180 42 200 40 Q220 42 235 58 Q250 75 248 110 Q248 130 240 140 L160 140 Q152 130 152 110 Z" fill="url(#helmetGrad)"/>

      <!-- Helmet top ridge -->
      <path d="M175 45 Q200 38 225 45" fill="none" stroke="#444444" stroke-width="3" stroke-linecap="round"/>

      <!-- Helmet side vents -->
      <line x1="158" y1="80" x2="158" y2="90" stroke="#555555" stroke-width="1.5"/>
      <line x1="158" y1="94" x2="158" y2="104" stroke="#555555" stroke-width="1.5"/>
      <line x1="242" y1="80" x2="242" y2="90" stroke="#555555" stroke-width="1.5"/>
      <line x1="242" y1="94" x2="242" y2="104" stroke="#555555" stroke-width="1.5"/>

      <!-- Helmet ear guards -->
      <path d="M152 90 Q145 92 144 100 Q144 110 150 115 L155 115 Q154 105 155 90 Z" fill="#2a2a2a" stroke="#444444" stroke-width="0.5"/>
      <path d="M248 90 Q255 92 256 100 Q256 110 250 115 L245 115 Q246 105 245 90 Z" fill="#2a2a2a" stroke="#444444" stroke-width="0.5"/>

      <!-- Visor/Cage frame -->
      <path d="M162 85 Q163 75 175 68 Q200 58 225 68 Q237 75 238 85" fill="none" stroke="#888888" stroke-width="2.5"/>
      <!-- Cage bottom frame -->
      <path d="M160 125 Q162 135 175 140 Q200 146 225 140 Q238 135 240 125" fill="none" stroke="#888888" stroke-width="2.5"/>
      <!-- Cage side frames -->
      <line x1="160" y1="85" x2="160" y2="125" stroke="#888888" stroke-width="2.5"/>
      <line x1="240" y1="85" x2="240" y2="125" stroke="#888888" stroke-width="2.5"/>

      <!-- Cage wire horizontal bars -->
      <path d="M162 95 Q200 88 238 95" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>
      <path d="M161 105 Q200 98 239 105" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>
      <path d="M161 115 Q200 108 239 115" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>

      <!-- Cage wire vertical bars -->
      <path d="M180 70 Q179 105 180 140" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>
      <path d="M200 65 Q199 105 200 143" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>
      <path d="M220 70 Q221 105 220 140" fill="none" stroke="#aaaaaa" stroke-width="1.2"/>

      <!-- Chin guard -->
      <path d="M175 138 Q200 145 225 138" fill="#2a2a2a" stroke="#444444" stroke-width="1"/>

      <!-- Helmet padding visible through cage -->
      <path d="M168 78 Q200 70 232 78 Q235 85 232 90 Q200 82 168 90 Q165 85 168 78 Z" fill="#1d3557" opacity="0.4"/>
    </g>

    <!-- Face hole border ring (clean edge) -->
    <circle cx="200" cy="105" r="45" fill="none" stroke="#222222" stroke-width="2.5"/>
    <circle cx="200" cy="105" r="46.5" fill="none" stroke="#444444" stroke-width="0.8"/>

  </g>
  <!-- End body group -->

  <!-- GOAL! Caption -->
  <g class="goal-text">
    <!-- Text shadow -->
    <text x="200" y="472" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="42" fill="#000000" opacity="0.3" letter-spacing="4">GOAL!</text>
    <!-- Main text -->
    <text x="200" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="42" fill="#e63946" stroke="#ffffff" stroke-width="1.5" letter-spacing="4">GOAL!</text>
  </g>
</svg>